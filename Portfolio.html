/* ─── FADE IN ────────────────────────────────────────────────── */
function FadeIn({ children, delay=0, duration=0.7, x=0, y=30, style:sp={}, className='' }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      setVis(e.isIntersecting);
    }, { rootMargin:'-40px 0px -40px 0px', threshold:0.05 });
    obs.observe(el); return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={className} style={{ opacity: vis?1:0, transform: vis?'translate(0,0)':`translate(${x}px,${y}px)`, transition:`opacity ${duration}s cubic-bezier(.25,.1,.25,1) ${delay}s,transform ${duration}s cubic-bezier(.25,.1,.25,1) ${delay}s`, ...sp }}>
      {children}
    </div>
  );
}

/* ─── MAGNET ─────────────────────────────────────────────────── */
function Magnet({ children, padding=150, strength=3 }) {
  const ref = useRef(null);
  const [tf, setTf] = useState({ v:'none', on:false });
  useEffect(() => {
    const mv = e => {
      if (!ref.current) return;
      const r = ref.current.getBoundingClientRect();
      const dx = e.clientX-(r.left+r.width/2), dy = e.clientY-(r.top+r.height/2);
      const d = Math.sqrt(dx*dx+dy*dy), thresh = Math.max(r.width,r.height)/2+padding;
      if (d < thresh) setTf({ v:`translate3d(${dx/strength}px,${dy/strength}px,0)`, on:true });
      else setTf(p => p.on ? { v:'none', on:false } : p);
    };
    window.addEventListener('mousemove', mv); return () => window.removeEventListener('mousemove', mv);
  }, [padding, strength]);
  return <div ref={ref} style={{ transform:tf.v, transition:tf.on?'transform .3s ease-out':'transform .6s ease-in-out', willChange:'transform' }}>{children}</div>;
}

/* ─── ANIMATED TEXT ──────────────────────────────────────────── */
function AnimatedText({ text, style:sp={}, className='' }) {
  const ref = useRef(null);
  const [prog, setProg] = useState(0);
  useEffect(() => {
    const fn = () => {
      if (!ref.current) return;
      const r = ref.current.getBoundingClientRect(), wh = window.innerHeight;
      const s = r.top - wh*.8, e = r.bottom - wh*.2;
      setProg(Math.max(0, Math.min(1, -s/(e-s))));
    };
    window.addEventListener('scroll', fn, { passive:true }); fn();
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <p ref={ref} className={className} style={sp}>
      {text.split('').map((c,i) => <span key={i} style={{ opacity: 0.2+Math.max(0,Math.min(1,prog*text.length-i))*.8 }}>{c}</span>)}
    </p>
  );
}

      setOffset((window.scrollY - top + window.innerHeight) * 0.3);

function ProjectCard({ project, index, total }) {
  const { roundedCards } = useContext(TweaksCtx);
  const cRef = useRef(null);
  const [scale, setScale] = useState(1);
  const targetScale = 1 - (total-1-index)*0.03;
  const stickyTop = 96 + index*28;
  const br = roundedCards ? 'clamp(20px,3.5vw,60px)' : '12px';

  useEffect(() => {
    const fn = () => {
      if (!cRef.current) return;
      const r = cRef.current.getBoundingClientRect(), wh = window.innerHeight;
      const scrolled = -r.top, tot = r.height - wh;
      if (tot > 0) setScale(1 - Math.max(0,Math.min(1,scrolled/tot))*(1-targetScale));
    };
    window.addEventListener('scroll', fn, { passive:true }); fn();
    return () => window.removeEventListener('scroll', fn);
  }, [targetScale]);

  return (
    <div ref={cRef} style={{ height:'85vh' }}>
      <div style={{ position:'sticky', top:`${stickyTop}px`, transform:`scale(${scale})`, transformOrigin:'top center', willChange:'transform', border:'2px solid #D7E2EA', borderRadius:br, background:'#0C0C0C', padding:'clamp(12px,1.5vw,28px)', overflow:'hidden' }}>

        </div>
        <div style={{ display:'flex', gap:'clamp(6px,1vw,12px)', height:'clamp(260px,36vw,540px)' }}>

            <img src={project.c1b} alt="" loading="eager" style={{ flex:1, width:'100%', objectFit:'cover', borderRadius:br }} />
          </div>
          <img src={project.c2} alt="" loading="eager" style={{ flex:'0 0 60%', height:'100%', objectFit:'cover', borderRadius:br }} />
        </div>
      </div>
    </div>
  );
}

      {/* Big heading */}
      <FadeIn delay={0} y={40}>
        <h2 className="hero-heading" style={{ fontWeight:900, textTransform:'uppercase', letterSpacing:'-.02em', lineHeight:1, textAlign:'center', fontSize:'clamp(3rem,12vw,160px)', marginBottom:'clamp(12px,2vw,32px)' }}>Contact</h2>
      </FadeIn>
      <FadeIn delay={0.1} y={20}>
        <p style={{ color:'#D7E2EA', opacity:.5, textAlign:'center', fontWeight:300, fontSize:'clamp(.85rem,1.4vw,1.15rem)', letterSpacing:'.04em', marginBottom:'clamp(40px,5vw,80px)' }}>

      </FadeIn>

      {/* Form */}
      <FadeIn delay={0.2} y={30}>
        <div style={{ maxWidth:640, margin:'0 auto' }}>
          {sent ? (

              <div style={{ fontSize:'3rem', marginBottom:16 }}>✅</div>
              <p style={{ color:'#D7E2EA', fontWeight:600, fontSize:'clamp(1rem,1.8vw,1.4rem)', marginBottom:8 }}>Message envoyé !</p>
              <p style={{ color:'#D7E2EA', opacity:.5, fontWeight:300, fontSize:'clamp(.85rem,1.2vw,1rem)' }}>Je vous recontacte très prochainement.</p>

            <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:'clamp(12px,1.5vw,20px)' }}>

                  required placeholder="Votre nom"
                  value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
                  style={{ ...inputStyle, flex:'1 1 200px' }}
                  onFocus={e=>e.target.style.borderColor='rgba(215,226,234,.5)'}
                  onBlur={e=>e.target.style.borderColor='rgba(215,226,234,.15)'}
                />
                <input
                  required type="email" placeholder="Votre email"
                  value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}
                  style={{ ...inputStyle, flex:'1 1 200px' }}
                  onFocus={e=>e.target.style.borderColor='rgba(215,226,234,.5)'}
                  onBlur={e=>e.target.style.borderColor='rgba(215,226,234,.15)'}

              </div>
              <textarea

                onFocus={e=>e.target.style.borderColor='rgba(215,226,234,.5)'}

              <div style={{ display:'flex', justifyContent:'center', paddingTop:'clamp(4px,1vw,12px)' }}>
                <button type="submit" style={{ background:a.grad, boxShadow:a.shadow, outline:'2px solid white', outlineOffset:'-3px', borderRadius:'9999px', color:'white', fontFamily:'Kanit,sans-serif', fontWeight:500, textTransform:'uppercase', letterSpacing:'.15em', cursor:'pointer', border:'none', padding:'clamp(12px,1.2vw,18px) clamp(36px,4vw,64px)', fontSize:'clamp(.8rem,.95vw,1.05rem)' }}>

            { label:'LinkedIn', href:'https://www.linkedin.com/in/mathis-paul-82157b2a0/' },
            { label:'GitHub', href:'https://github.com/mxthisp' },

          © 2026 Mathis — Développeur IA / Auditeur IA

      </FadeIn>
    </section>
  );
}

/* ═══════════════════════════════════════════════════════════════
   TWEAKS PANEL
═══════════════════════════════════════════════════════════════ */
function TweaksFloating({ tweaks, setTweak, visible, onClose }) {
  if (!visible) return null;
  const dot = (color, key) => (
    <button key={key} onClick={()=>setTweak('accent',key)} style={{ width:28, height:28, borderRadius:'50%', background:ACCENTS[key].grad, border: tweaks.accent===key ? '2px solid white':'2px solid rgba(255,255,255,.15)', cursor:'pointer', flexShrink:0 }} />
  );
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:'rgba(14,14,28,.95)', backdropFilter:'blur(12px)', border:'1px solid rgba(215,226,234,.15)', borderRadius:16, padding:'20px 20px', width:220, fontFamily:'Kanit,sans-serif', color:'#D7E2EA', boxShadow:'0 8px 32px rgba(0,0,0,.6)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
        <span style={{ fontWeight:700, fontSize:12, textTransform:'uppercase', letterSpacing:'.12em' }}>Tweaks</span>
        <button onClick={onClose} style={{ background:'none', border:'none', color:'#D7E2EA', cursor:'pointer', fontSize:16, opacity:.6, lineHeight:1 }}>✕</button>
      </div>
      <div style={{ marginBottom:16 }}>
        <p style={{ fontSize:10, opacity:.5, textTransform:'uppercase', letterSpacing:'.1em', marginBottom:8 }}>Couleur d&apos;accent</p>
        <div style={{ display:'flex', gap:8 }}>
          {dot('#0044FF','blue')}{dot('#B600A8','purple')}{dot('#00A878','emerald')}
        </div>
      </div>
      <div>
        <p style={{ fontSize:10, opacity:.5, textTransform:'uppercase', letterSpacing:'.1em', marginBottom:8 }}>Coins des cartes</p>
        <div style={{ display:'flex', gap:6 }}>
          {[['Ronds',true],['Carrés',false]].map(([lbl,val]) => (
            <button key={lbl} onClick={()=>setTweak('roundedCards',val)} style={{ flex:1, padding:'5px 0', borderRadius:6, border:`1px solid ${tweaks.roundedCards===val?'#D7E2EA':'rgba(215,226,234,.2)'}`, background: tweaks.roundedCards===val ? 'rgba(215,226,234,.1)':'transparent', color:'#D7E2EA', cursor:'pointer', fontFamily:'Kanit,sans-serif', fontSize:11, fontWeight:500, textTransform:'uppercase', letterSpacing:'.06em' }}>{lbl}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const setTweak = useCallback((key, val) => {
    setTweaksState(p => {
      const next = { ...p, [key]: val };
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  }, []);

  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const onClose = () => { setTweaksOpen(false); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); };

  return (
    <TweaksCtx.Provider value={tweaks}>
      <div style={{ background:'#0C0C0C', overflowX:'clip' }}>
        <HeroSection />
        <MarqueeSection />
        <AboutSection />
        <ServicesSection />
        <ProjectsSection />
        <ContactSection />
        <TweaksFloating tweaks={tweaks} setTweak={setTweak} visible={tweaksOpen} onClose={onClose} />
      </div>
    </TweaksCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
